apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "common.names.fullname" . | trunc 37 | trimSuffix "-" }}-{{ sha256sum .Chart.AppVersion | trunc 8 }}-{{ sha256sum (toYaml (dict "config" .Values.config "extraConfig" .Values.extraConfig)) | trunc 8 }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.useHooks }}
  {{- $defaultAnnotations := dict "helm.sh/hook" "pre-upgrade" "helm.sh/hook-delete-policy" "hook-succeeded" }}
  {{- $annotations := include "common.tplvalues.merge" ( dict "values" ( list .Values.commonAnnotations $defaultAnnotations ) "context" . ) }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $ ) | nindent 4 }}
  {{- else }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.backoffLimit }}
  template:
    metadata:
      {{- $podLabels := include "common.tplvalues.merge" ( dict "values" ( list .Values.podLabels .Values.commonLabels ) "context" . ) }}
      labels: {{- include "common.labels.standard" ( dict "customLabels" $podLabels "context" $ ) | nindent 8 }}
      {{- if .Values.podAnnotations }}
      annotations: {{- include "common.tplvalues.render" (dict "value" .Values.podAnnotations "context" $) | nindent 8 }}
      {{- end }}
    spec:
      {{- include "common.images.renderPullSecrets" ( dict "images" (list .Values.image) "context" $) | nindent 6 }}
      restartPolicy: OnFailure
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.podSecurityContext "context" $) | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- if .Values.hostAliases }}
      hostAliases: {{- include "common.tplvalues.render" (dict "value" .Values.hostAliases "context" $) | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.initContainers }}
        {{- include "common.tplvalues.render" (dict "value" .Values.initContainers "context" $) | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ include "common.names.fullname" . | trunc 63 | trimSuffix "-" }}
          image: {{ include "common.images.image" ( dict "imageRoot" .Values.image "global" .Values.global "chart" .Chart ) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.command }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.command "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.args "context" $) | nindent 12 }}
          {{- else }}
          args:
            - import
            - {{ required "A MinIO URL is required" .Values.url | quote }}
            - --import-file-location=/configs
          {{- end }}
          env:
            {{- if .Values.accessKey }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.accessKey | quote }}
            {{- end }}
            {{- if .Values.secretKey }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.secretKey | quote }}
            {{- end }}
            {{- if .Values.oidcIssuerUrl }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.oidcIssuerUrl | quote }}
            {{- end }}
            {{- if .Values.oidcClientId }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oidcClientId | quote }}
            {{- end }}
            {{- if .Values.oidcClientSecret }}
            - name: OIDC_CLIENT_SECRET
              value: {{ .Values.oidcClientSecret | quote }}
            {{- end }}
            {{- if .Values.oidcExtraScopes }}
            - name: OIDC_EXTRA_SCOPES
              value: {{ join "," .Values.oidcExtraScopes | quote }}
            {{- end }}
            {{- if .Values.grantType }}
            - name: OIDC_GRANT_TYPE
              value: {{ .Values.grantType | quote }}
            {{- end }}
            {{- if .Values.username }}
            - name: OIDC_USERNAME
              value: {{ .Values.username | quote }}
            {{- end }}
            {{- if .Values.password }}
            - name: OIDC_PASSWORD
              value: {{ .Values.password | quote }}
            {{- end }}
            {{- if .Values.extraEnvVars }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
          {{- if or .Values.extraEnvVarsCM .Values.extraEnvVarsSecret }}
          envFrom:
            {{- if .Values.extraEnvVarsCM }}
            - configMapRef:
                name: {{ .Values.extraEnvVarsCM }}
            {{- end }}
            {{- if .Values.extraEnvVarsSecret }}
            - secretRef:
                name: {{ .Values.extraEnvVarsSecret }}
            {{- end }}
          {{- end }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.containerSecurityContext "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.customLivenessProbe }}
          livenessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customLivenessProbe "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.customReadinessProbe }}
          readinessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customReadinessProbe "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.customStartupProbe }}
          startupProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customStartupProbe "context" $) | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: configs
              mountPath: /configs
          {{- if .Values.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumeMounts "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.resources }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- else }}
          resources: 
            requests:
              cpu: 10m
              memory: 128Mi
          {{- end }}
      volumes:
        - name: configs
          configMap:
            name: {{ include "common.names.fullname" . | trunc 63 | trimSuffix "-" }}
      {{- if .Values.extraVolumes }}
      {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumes "context" $) | nindent 8 }}
      {{- end }}
